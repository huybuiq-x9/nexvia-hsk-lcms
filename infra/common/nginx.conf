# ============================================================
# Nginx Configuration - Reverse Proxy
# Used by test, staging, and prod environments
# ============================================================

server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so nginx can recover when upstream
    # containers are recreated and receive new IP addresses.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream backend:8000;
    set $frontend_upstream frontend:80;
    set $minio_upstream minio:9000;

    # ─── Security Headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Frontend (React) ─────────────────────────────────────
    location / {
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Backend API ──────────────────────────────────────────
    location /api/ {
        # Documents and SCORM packages are uploaded through the API first,
        # then the backend stores them in MinIO/S3.
        client_max_body_size 500m;

        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ─── Backend WebSocket ─────────────────────────────────────
    location /ws/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Health Check ─────────────────────────────────────────
    location /health {
        return 200 'nginx healthy\n';
        add_header Content-Type text/plain;
        access_log off;
    }

    # ─── Backend Docs / OpenAPI ────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ─── MinIO / S3 Proxy ─────────────────────────────────────
    # Proxies /minio/<bucket>/... to MinIO container.
    # Backend returns URLs like: /minio/lcms/...
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://$minio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable request body limit for large file uploads
        client_max_body_size 500m;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
