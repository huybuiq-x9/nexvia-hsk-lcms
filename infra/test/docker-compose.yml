# ============================================================
# Docker Compose - Test Environment
# Optimized for VM deployment on Google Cloud
# ============================================================

services:
  # ─── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lcms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../common/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  # ─── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.backend
    container_name: lcms_backend_test
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lcms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - scorm_tmp:/app/.tmp/scorm-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Celery Worker ──────────────────────────────────────────
  celery:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.backend
    container_name: lcms_celery_test
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lcms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - scorm_tmp:/app/.tmp/scorm-uploads
    command: celery -A celery_app worker --loglevel=info --queues=default,scorm --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: lcms_frontend_test
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lcms_redis_test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Expose PostgreSQL port for test ────────────────────────
  postgres:
    ports:
      - "5432:5432"

volumes:
  scorm_tmp:
