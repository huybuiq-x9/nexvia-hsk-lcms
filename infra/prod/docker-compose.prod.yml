# ============================================================
# Docker Compose - Production Environment
# SSL enabled, no debug, optimized for performance
# ============================================================

services:
  # ─── Nginx Reverse Proxy with SSL ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lcms_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../common/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  # ─── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.backend
    container_name: lcms_backend_prod
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lcms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: lcms_frontend_prod
    restart: always
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
