# ============================================================
# Docker Compose - Development Environment
# Hot reload enabled for both backend and frontend
# ============================================================

services:
  # ─── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.backend.dev
    container_name: lcms_backend_dev
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lcms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../../backend:/app
    ports:
      - "8000:8000"
      - "5678:5678"
    command: >
      python -m debugpy
      --listen 0.0.0.0:5678
      -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.frontend.dev
    container_name: lcms_frontend_dev
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=/api/v1
      - VITE_DEV_PROXY_TARGET=http://backend:8000
    volumes:
      - ../../front:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  # ─── Expose PostgreSQL port for dev ─────────────────────────
  postgres:
    ports:
      - "5432:5432"

  # ─── Redis / Celery ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ─── Celery Worker ─────────────────────────────────────────────
  celery:
    build:
      context: ../..
      dockerfile: infra/common/Dockerfile.backend.dev
    container_name: lcms_celery_dev
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lcms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ../../backend:/app
    command: celery -A celery_app worker --loglevel=info --queues=default,scorm
    depends_on:
      - postgres
      - redis
